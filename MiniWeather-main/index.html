<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <h1><i class="fas fa-cloud-sun"></i> Weather</h1>

    <div class="search-box">
        <input id="city-input" placeholder="Enter city..." />
        <button id="search-btn"><i class="fas fa-search"></i></button>
        <button id="location-btn"><i class="fas fa-location-crosshairs"></i></button>
    </div>

    <div class="unit-toggle">
        <button id="celsius-btn" class="active">°C</button>
        <button id="fahrenheit-btn">°F</button>
    </div>
</header>

<main class="main">

    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Loading...</p>
    </div>

    <section id="current-weather" class="card">
        <h2 id="current-location">---</h2>

        <div class="current-main">
            <div id="current-icon" class="weather-icon"></div>
            <div>
                <span id="current-temp">--</span>
                <span id="temp-unit">°C</span>
                <p id="current-condition">---</p>
            </div>
        </div>

        <div class="details">
            <div>Feels <span id="feels-like">--</span></div>
            <div>Humidity <span id="humidity">--%</span></div>
            <div>Wind <span id="wind-speed">--</span></div>
            <div>UV <span id="uv-index">--</span></div>
        </div>

        <p id="last-updated" class="updated"></p>
    </section>

    <section id="forecast" class="card">
        <h3>Next Days</h3>
        <div id="daily-cards" class="forecast"></div>
    </section>

</main>

<div id="error-message" class="error">
    <div class="error-box">
        <p id="error-text"></p>
        <button id="error-close-btn">OK</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
